name: "Test"

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  # ── unit tests (no Docker required, fast) ─────────────────────────────────
  unit-tests:
    name: "Unit tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Install test dependencies (jq)"
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y --no-install-recommends jq git

      - name: "Run git-identity-from-github unit tests"
        run: bash test/unit/test_git_identity.sh

      - name: "Run devbox/install.sh unit tests"
        run: bash test/unit/test_devbox_install.sh

      - name: "Run oh-my-zsh/install.sh unit tests"
        run: bash test/unit/test_oh_my_zsh_install.sh

      - name: "Run supabase-cli unit tests"
        run: bash test/unit/test_supabase_cli_install.sh

      - name: "Run coder/install.sh unit tests"
        run: bash test/unit/test_coder_install.sh

      - name: "Run project-setup unit tests"
        run: bash test/unit/test_project_setup.sh

  # ── integration tests (Docker, devcontainer CLI) ──────────────────────────
  integration-git-identity:
    name: "Integration — git-identity-from-github (${{ matrix.base-image }})"
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        base-image:
          - mcr.microsoft.com/devcontainers/base:ubuntu-22.04
          - mcr.microsoft.com/devcontainers/base:ubuntu
    steps:
      - uses: actions/checkout@v4

      - name: "Log in to GHCR"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Install devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Test feature (skip-scenarios, base image: ${{ matrix.base-image }})"
        run: |
          devcontainer features test \
            --skip-scenarios \
            -f git-identity-from-github \
            -i "${{ matrix.base-image }}" \
            .

      - name: "Test feature scenarios"
        run: |
          devcontainer features test \
            --skip-autogenerated \
            --skip-duplicated \
            -f git-identity-from-github \
            .


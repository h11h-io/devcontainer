name: "Test"

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    name: "shellcheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Install shellcheck"
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y --no-install-recommends shellcheck

      - name: "Run shellcheck"
        run: |
          find . -not -path './.git/*' -name '*.sh' -print0 |
            xargs -0 shellcheck --severity=warning

  shfmt:
    name: "shfmt"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Install shfmt"
        run: |
          curl -fsSL \
            https://github.com/mvdan/sh/releases/download/v3.10.0/shfmt_v3.10.0_linux_amd64 \
            -o /usr/local/bin/shfmt
          chmod +x /usr/local/bin/shfmt

      - name: "Check shell formatting"
        run: |
          find . -not -path './.git/*' -name '*.sh' -print0 |
            xargs -0 shfmt --diff

  json-validate:
    name: "validate JSON"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Validate JSON"
        run: |
          find . -not -path './.git/*' -name '*.json' -print0 |
            xargs -0 -n1 jq empty

  unit-tests:
    name: "Unit tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Install test dependencies"
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y --no-install-recommends jq git

      - name: "Run unit tests"
        run: |
          failed=0
          for test_file in test/unit/test_*.sh; do
            if ! bash "$test_file"; then
              failed=1
            fi
          done
          exit "$failed"

  integration-smoke:
    name: "Smoke — ${{ matrix.feature }} on ${{ matrix.image-name }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - feature: devbox
            image: mcr.microsoft.com/devcontainers/base:ubuntu-22.04
            image-name: base-ubuntu-22.04
          - feature: devbox
            image: mcr.microsoft.com/devcontainers/javascript-node:1-22-bookworm
            image-name: node-22-bookworm
          - feature: devbox
            image: mcr.microsoft.com/devcontainers/python:1-3.13-bookworm
            image-name: python-3.13-bookworm
          - feature: git-identity-from-github
            image: mcr.microsoft.com/devcontainers/base:ubuntu-22.04
            image-name: base-ubuntu-22.04
          - feature: git-identity-from-github
            image: mcr.microsoft.com/devcontainers/javascript-node:1-22-bookworm
            image-name: node-22-bookworm
          - feature: git-identity-from-github
            image: mcr.microsoft.com/devcontainers/python:1-3.13-bookworm
            image-name: python-3.13-bookworm
          - feature: oh-my-zsh
            image: mcr.microsoft.com/devcontainers/base:ubuntu-22.04
            image-name: base-ubuntu-22.04
          - feature: oh-my-zsh
            image: mcr.microsoft.com/devcontainers/javascript-node:1-22-bookworm
            image-name: node-22-bookworm
          - feature: oh-my-zsh
            image: mcr.microsoft.com/devcontainers/python:1-3.13-bookworm
            image-name: python-3.13-bookworm
    steps:
      - uses: actions/checkout@v4

      - name: "Install devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Apply feature and run smoke test"
        run: |
          devcontainer features test \
            --project-folder . \
            --skip-scenarios \
            -f "${{ matrix.feature }}" \
            -i "${{ matrix.image }}"

  integration-scenarios:
    name: "Scenarios — ${{ matrix.feature }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        feature:
          - devbox
          - git-identity-from-github
          - oh-my-zsh
    steps:
      - uses: actions/checkout@v4

      - name: "Install devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Test feature scenarios"
        run: |
          devcontainer features test \
            --project-folder . \
            --skip-autogenerated \
            --skip-duplicated \
            -f "${{ matrix.feature }}"

  detect-changes:
    name: "Detect feature changes"
    if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    outputs:
      features_changed: ${{ steps.changes.outputs.features_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Determine whether to publish"
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "features_changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- src/ |
            grep -q '^src/'; then
            echo "features_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "features_changed=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: "Publish features to GHCR"
    needs:
      - shellcheck
      - shfmt
      - json-validate
      - unit-tests
      - integration-smoke
      - integration-scenarios
      - detect-changes
    if: ${{ github.ref == 'refs/heads/main' && needs.detect-changes.outputs.features_changed == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: "Inject git SHA into install scripts"
        run: |
          find src -name 'install.sh' -print0 |
            xargs -0 sed -i "s/@GIT_SHA@/${{ github.sha }}/g"

      - name: "Publish features"
        uses: devcontainers/action@v1
        with:
          publish-features: "true"
          base-path-to-features: "./src"
          generate-docs: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Create PR for generated documentation"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          branch="automated-documentation-update-${GITHUB_RUN_ID}"
          git switch -c "$branch"
          git add '*/**/README.md'
          if git commit -m 'docs: automated documentation update [skip ci]'; then
            git push origin "$branch"
            gh pr create \
              --title "docs: automated documentation update" \
              --body "Auto-generated feature documentation from release workflow."
          fi

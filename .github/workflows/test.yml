name: "Test"

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── unit tests (no Docker required, fast) ─────────────────────────────────
  unit-tests:
    name: "Unit tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Install test dependencies (jq)"
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y --no-install-recommends jq git

      - name: "Run git-identity-from-github unit tests"
        run: bash test/unit/test_git_identity.sh

      - name: "Run devbox/install.sh unit tests"
        run: bash test/unit/test_devbox_install.sh

      - name: "Run oh-my-zsh/install.sh unit tests"
        run: bash test/unit/test_oh_my_zsh_install.sh

  # ── integration tests (Docker, devcontainer CLI) ──────────────────────────
  integration-smoke:
    name: "Smoke — ${{ matrix.feature }} on ${{ matrix.image-name }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - feature: devbox
            image: mcr.microsoft.com/devcontainers/base:ubuntu-22.04
            image-name: base-ubuntu-22.04
          - feature: devbox
            image: mcr.microsoft.com/devcontainers/javascript-node:1-22-bookworm
            image-name: node-22-bookworm
          - feature: devbox
            image: mcr.microsoft.com/devcontainers/python:1-3.13-bookworm
            image-name: python-3.13-bookworm
          - feature: git-identity-from-github
            image: mcr.microsoft.com/devcontainers/base:ubuntu-22.04
            image-name: base-ubuntu-22.04
          - feature: git-identity-from-github
            image: mcr.microsoft.com/devcontainers/javascript-node:1-22-bookworm
            image-name: node-22-bookworm
          - feature: git-identity-from-github
            image: mcr.microsoft.com/devcontainers/python:1-3.13-bookworm
            image-name: python-3.13-bookworm
          - feature: oh-my-zsh
            image: mcr.microsoft.com/devcontainers/base:ubuntu-22.04
            image-name: base-ubuntu-22.04
          - feature: oh-my-zsh
            image: mcr.microsoft.com/devcontainers/javascript-node:1-22-bookworm
            image-name: node-22-bookworm
          - feature: oh-my-zsh
            image: mcr.microsoft.com/devcontainers/python:1-3.13-bookworm
            image-name: python-3.13-bookworm
    steps:
      - uses: actions/checkout@v4

      - name: "Install devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Apply feature and run smoke test"
        run: |
          devcontainer features test \
            --project-folder . \
            --skip-scenarios \
            -f "${{ matrix.feature }}" \
            -i "${{ matrix.image }}"

  # Option scenarios run once; the smoke matrix owns image portability.
  integration-scenarios:
    name: "Scenarios — ${{ matrix.feature }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        feature:
          - devbox
          - git-identity-from-github
          - oh-my-zsh
    steps:
      - uses: actions/checkout@v4

      - name: "Install devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Test feature scenarios"
        run: |
          devcontainer features test \
            --project-folder . \
            --skip-autogenerated \
            --skip-duplicated \
            -f "${{ matrix.feature }}"

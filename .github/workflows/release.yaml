name: "Release — publish features to GHCR"

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  # ── gate 1: lint (shellcheck + shfmt + JSON validation) ──────────────────
  lint:
    name: "Lint (gate)"
    uses: ./.github/workflows/lint.yml

  # ── gate 2: unit tests (no Docker, fast) ─────────────────────────────────
  unit-tests:
    name: "Unit tests (gate)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Install test dependencies"
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y --no-install-recommends jq git

      - name: "Run git-identity-from-github unit tests"
        run: bash test/unit/test_git_identity.sh

      - name: "Run devbox/install.sh unit tests"
        run: bash test/unit/test_devbox_install.sh

  # ── publish (only runs when both gates pass) ──────────────────────────────
  publish:
    name: "Publish features to GHCR"
    needs: [lint, unit-tests]
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: "Publish features"
        uses: devcontainers/action@v1
        with:
          publish-features: "true"
          base-path-to-features: "./src"
          generate-docs: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Create PR for auto-generated documentation"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config pull.rebase false
          branch="automated-documentation-update-${GITHUB_RUN_ID}"
          git checkout -b "$branch"
          git add '*/**/README.md'
          git commit -m 'docs: automated documentation update [skip ci]' || export NO_UPDATES=true
          if [ "${NO_UPDATES:-false}" != "true" ]; then
            git push origin "$branch"
            gh pr create \
              --title "docs: automated documentation update" \
              --body "Auto-generated feature documentation from release workflow."
          fi
